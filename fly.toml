# fly.toml app configuration file generated for fourfreedoms on 2025-03-23T15:38:10Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#
# fly ips allocate-v4 --shared    
# VERSION IP              TYPE    REGION 
# v4      66.241.125.22   shared  global
# You can use a shared IPv4 address for TCP ports other than 80 and 443 by using the 
# TLS handler when you specify the port.

app = "fourfreedoms-polished-butterfly-4117"
primary_region = "bos"
kill_signal = "SIGTERM"

[build]
  dockerfile = "Dockerfile"

# Non-sensitive environmenntal values
[env]
  PORT = "8080"
  API_PORT = "3001"
  NEXT_PUBLIC_API_BASE_URL = "https://fourfreedoms-polished-butterfly-4117.fly.dev:3001/api"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [[http_service.checks]]
    interval = "30s"
    timeout = "10s"
    grace_period = "20s"
    method = "GET"
    path = "/"
    protocol = "http"
    tls_skip_verify = true

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 1024

[deploy]
  strategy = "rolling"

[[services]]
  protocol = "tcp"
    internal_port = 3001
    auto_stop_machines = "stop"
    auto_start_machines = true
    min_machines_running = 0
    processes = ["app"]

    [[services.ports]]
      port = 3001
      handlers = ["tls", "http"]

[checks]
  [checks.api_check]
    grace_period = "30s"
    interval = "30s"
    method = "get"
    path = "/api/health"
    port = 3001
    timeout = "10s"
    type = "http"
    [checks.api_check.headers]
      Content-Type = "application/json"
