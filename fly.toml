# fly.toml app configuration file generated for fourfreedoms on 2025-03-23T15:38:10Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = "fourfreedoms-polished-butterfly-4117"
primary_region = "bos"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8080"
  API_PORT = "3001"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [[http_service.checks]]
    interval = "15s"
    timeout = "2s"
    grace_period = "5s"
    method = "GET"
    path = "/"
    protocol = "http"
    tls_skip_verify = true

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 1024

[deploy]
  strategy = "rolling"

[[services]]
  protocol = "tcp"
  internal_port = 3001
  auto_stop_machines = true
  auto_start_machines = true
  force_https = true
  processes = ["app"]

  [[services.ports]]
    port = 3001
    handlers = ["http"]
